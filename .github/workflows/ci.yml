name: Python CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Upgrade pip
      run: python -m pip install --upgrade pip

    - name: Install dependencies (API Gateway)
      run: |
        pip install -r API-gateway/requirements.txt

    - name: Install pytest
      run: |
        pip install pytest

    - name: Run tests
      run: |
        pytest